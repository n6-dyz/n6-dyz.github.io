<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack | n6-dyz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; padding: 40px; }
        .container { max-width: 600px; margin: auto; text-align: center; }
        .back-btn { color: #3ddc84; text-decoration: none; display: block; margin-bottom: 30px; }
        h1 { color: #3ddc84; margin-bottom: 40px; }
        .stack-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .stack-card { background: #161b22; border: 1px solid #30363d; padding: 15px 25px; border-radius: 12px; min-width: 100px; }
        .stack-card i { font-size: 24px; color: #3ddc84; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <h1>Technology Stack</h1>
        <div class="stack-list">
            <div class="stack-card"><i class="fab fa-android"></i><span>Android SDK</span></div>
            <div class="stack-card"><i class="fas fa-code"></i><span>Kotlin</span></div>
            <div class="stack-card"><i class="fas fa-layer-group"></i><span>Compose</span></div>
            <div class="stack-card"><i class="fas fa-database"></i><span>Firebase</span></div>
            <div class="stack-card"><i class="fab fa-git-alt"></i><span>Git</span></div>
            <div class="stack-card"><i class="fas fa-microchip"></i><span>Xposed</span></div>
        </div>
    </div>
</body>
</html>
