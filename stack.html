<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack | n6-dyz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        .back-btn { color: #3ddc84; text-decoration: none; display: inline-block; margin-bottom: 30px; transition: 0.3s; }
        .back-btn:hover { opacity: 0.7; transform: translateX(-5px); }
        h1 { color: #ffffff; margin-bottom: 10px; font-weight: 600; }
        p.subtitle { color: #8b949e; margin-bottom: 50px; }
        
        .stack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        
        .stack-card { 
            background: #161b22; border: 1px solid #30363d; padding: 25px 15px; 
            border-radius: 15px; transition: all 0.3s ease; cursor: default;
        }
        .stack-card i { font-size: 40px; margin-bottom: 15px; display: block; }
        .stack-card span { font-weight: 500; font-size: 14px; letter-spacing: 0.5px; }

        /* Hover Effects dengan Warna Brand */
        .stack-card:hover { transform: translateY(-10px); border-color: #ffffff33; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* Warna Spesifik Teknologi */
        .kotlin:hover { color: #7F52FF; box-shadow: 0 10px 20px rgba(127, 82, 255, 0.2); }
        .android:hover { color: #3DDC84; box-shadow: 0 10px 20px rgba(61, 220, 132, 0.2); }
        .firebase:hover { color: #FFCA28; box-shadow: 0 10px 20px rgba(255, 202, 40, 0.2); }
        .compose:hover { color: #4285F4; box-shadow: 0 10px 20px rgba(66, 133, 244, 0.2); }
        .git:hover { color: #F05032; box-shadow: 0 10px 20px rgba(240, 80, 50, 0.2); }
        .system:hover { color: #3ddc84; box-shadow: 0 10px 20px rgba(61, 220, 132, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <h1>Technical Stack</h1>
        <p class="subtitle">Teknologi dan alat yang saya gunakan untuk membangun solusi mobile tingkat lanjut.</p>
        
        <div class="stack-grid">
            <div class="stack-card android"><i class="fab fa-android"></i><span>Android Studio</span></div>
            <div class="stack-card kotlin"><i class="fas fa-code"></i><span>Kotlin Language</span></div>
            <div class="stack-card compose"><i class="fas fa-layer-group"></i><span>Jetpack Compose</span></div>
            <div class="stack-card firebase"><i class="fas fa-database"></i><span>Firebase Services</span></div>
            <div class="stack-card git"><i class="fab fa-git-alt"></i><span>Git & GitHub</span></div>
            <div class="stack-card system"><i class="fas fa-microchip"></i><span>System Hooks</span></div>
        </div>
    </div>
</body>
</html>
